<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Job form — JobBoard')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>
<main>
<div class="card" style="max-width:640px;margin:0 auto;">
  <h1 th:text="${editId == null ? 'New job posting' : 'Edit job posting'}"></h1>
  <form th:object="${jobPostDto}" method="post"
        th:action="${editId == null ? @{/jobs} : @{|/jobs/${editId}|}}">
    <div class="field"><label>Title</label><input th:field="*{title}"/><span class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span></div>
    <div class="field"><label>Description</label><textarea th:field="*{description}"></textarea><span class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span></div>
    <div class="field"><label>Location</label><input th:field="*{location}"/><span class="error" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></span></div>
    <div class="field"><label>Salary</label><input type="number" step="0.01" th:field="*{salary}"/><span class="error" th:if="${#fields.hasErrors('salary')}" th:errors="*{salary}"></span></div>
    <div class="field"><label>Company</label>
      <select th:field="*{companyId}">
        <option value="">-- choose company --</option>
        <option th:each="c : ${companies}" th:value="${c.id}" th:text="${c.name}"></option>
      </select>
      <span class="error" th:if="${#fields.hasErrors('companyId')}" th:errors="*{companyId}"></span>
    </div>
    <button class="btn" type="submit">Save</button>
    <a class="btn secondary" th:href="@{/jobs/manage}">Cancel</a>
  </form>
</div>
</main></body></html>
