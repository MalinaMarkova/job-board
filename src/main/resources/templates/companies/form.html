<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Company form — JobBoard')}"></head>

<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>

<main>
  <div class="card" style="max-width:560px;margin:0 auto;">

    <h1 th:text="${editId == null ? 'New company' : 'Edit company'}"></h1>

    <!-- CREATE -->
    <form th:if="${editId == null}"
          th:object="${companyDto}"
          method="post"
          th:action="@{/companies}">

      <div class="field">
        <label>Name</label>
        <input th:field="*{name}"/>
        <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
      </div>

      <div class="field">
        <label>Description</label>
        <textarea th:field="*{description}"></textarea>
        <span class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
      </div>

      <div class="field">
        <label>Website</label>
        <input th:field="*{website}"/>
        <span class="error" th:if="${#fields.hasErrors('website')}" th:errors="*{website}"></span>
      </div>

      <button class="btn" type="submit">Save</button>
      <a class="btn secondary" th:href="@{/companies}">Cancel</a>
    </form>

    <!-- EDIT -->
    <form th:if="${editId != null}"
          th:object="${companyDto}"
          method="post"
          th:action="@{/companies/{id}(id=${editId})}">

      <div class="field">
        <label>Name</label>
        <input th:field="*{name}"/>
        <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
      </div>

      <div class="field">
        <label>Description</label>
        <textarea th:field="*{description}"></textarea>
        <span class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
      </div>

      <div class="field">
        <label>Website</label>
        <input th:field="*{website}"/>
        <span class="error" th:if="${#fields.hasErrors('website')}" th:errors="*{website}"></span>
      </div>

      <button class="btn" type="submit">Save</button>
      <a class="btn secondary" th:href="@{/companies}">Cancel</a>
    </form>

  </div>
</main>
</body>
</html>
